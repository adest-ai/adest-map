<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いつもそばに、誰とも違う — Adest 実装マッピング</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1019; --panel:#1a1e2d; --panel2:#222739; --line:#2c3149; --line2:#3d4463;
  --paper:#ece9e2; --dim:#9d9a8d;
  --soul:#9db4cc; --pers:#d98ba1; --exp:#d4aa6a; --tho:#6cc5b5; --mem:#a98fd6; --base:#8f95a8;
  --fixed:#4cc38a; --part:#d9b44c; --desg:#5aa7dd; --none:#7d7d88;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --body:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  --disp:'Zen Old Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--paper);font-family:var(--body);overflow:hidden;
  background-image:radial-gradient(ellipse 55% 70% at 62% 40%, #182038 0%, transparent 62%)}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--paper);outline-offset:2px}

/* ---------- stage grid ---------- */
.stage{height:100vh;display:grid;grid-template-columns:clamp(400px,30vw,540px) 1fr;grid-template-rows:1fr auto}
.side{grid-row:1/3;display:flex;flex-direction:column;justify-content:space-between;gap:2vh;padding:4vh 1.4vw 2.6vh 2.4vw;min-height:0;overflow:hidden}
.slogan{writing-mode:vertical-rl;font-family:var(--disp);font-weight:900;color:var(--paper);align-self:flex-start;
  font-size:clamp(24px,3.8vh,42px);letter-spacing:.24em;line-height:1.5;text-shadow:0 0 44px rgba(157,180,204,.18);
  max-height:46vh;flex:0 1 auto}
.slogan small{display:block;font-family:var(--mono);font-weight:400;font-size:clamp(8px,1vh,10px);letter-spacing:.3em;color:var(--dim);margin-left:1.2em}
.infocard{border:1px solid var(--line2);border-radius:18px;background:linear-gradient(170deg,rgba(28,33,53,.7),rgba(20,24,38,.7));
  padding:clamp(20px,3vh,30px) clamp(18px,1.7vw,28px);box-shadow:0 10px 34px rgba(0,0,0,.35), inset 0 1px 0 rgba(236,233,226,.05);flex:0 0 auto;overflow:hidden}
.infocard .sub{font-size:clamp(13px,1.6vh,16px);color:var(--paper);line-height:2;letter-spacing:.03em;white-space:nowrap}
.infocard .sub b{color:var(--paper)}
.infocard .hint{margin-top:2vh;display:block;text-align:center;font-size:clamp(12px,1.45vh,14.5px);letter-spacing:.03em;color:var(--dim);
  border:1px solid var(--line2);border-radius:12px;padding:1.2vh 1vw;line-height:1.6}
.infocard .hint b{color:var(--paper)}
.infocard .legend{margin-top:2vh;display:flex;flex-wrap:wrap;column-gap:1.6vw;row-gap:1.2vh;font-size:clamp(12px,1.45vh,14px);color:var(--dim);letter-spacing:.02em}
.infocard .legend span{white-space:nowrap}
.infocard .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.infocard .stat{margin-top:2vh;padding-top:2vh;border-top:1px solid var(--line);display:flex;align-items:center;gap:1vw}
.infocard .stat .n{font-family:var(--disp);font-weight:900;font-size:clamp(26px,3.8vh,38px);color:var(--paper);white-space:nowrap;flex:0 0 auto}
.infocard .stat .l{font-size:clamp(11px,1.4vh,13.5px);color:var(--paper);line-height:1.7;white-space:nowrap}
.infocard .stat .l b{color:var(--paper);font-weight:700}
.legend .impl i{background:var(--fixed)} .legend .part i{background:var(--part)}
.legend .desg i{background:var(--desg)} .legend .none i{background:var(--none)}

/* ---------- radial ---------- */
.radialwrap{position:relative;grid-column:2;grid-row:1;min-height:0}
.radial{position:absolute;inset:0}
.radial svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.rnode{position:absolute;z-index:2}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border-radius:50%;
  background:radial-gradient(circle at 38% 30%, #232a44, #141826 70%);border:1px solid var(--line2);
  box-shadow:0 0 0 10px rgba(61,68,99,.12), 0 18px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(236,233,226,.07)}
.center .nm{font-family:var(--disp);font-weight:900;font-size:clamp(26px,4vh,40px);letter-spacing:.1em}
.center .en{font-family:var(--mono);font-size:clamp(9px,1.2vh,12px);letter-spacing:.32em;color:var(--dim);margin-top:.6vh}
.elbadge{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.elbadge .jp{font-family:var(--disp);font-weight:900;font-size:clamp(26px,4.2vh,42px);letter-spacing:.1em;color:var(--c);
  text-shadow:0 0 28px color-mix(in srgb,var(--c) 60%,transparent)}
.elbadge .en{font-family:var(--mono);font-size:clamp(8px,1.05vh,10.5px);letter-spacing:.26em;color:var(--dim);margin-top:.4vh}

.fn{position:absolute;z-index:3;display:flex;align-items:center;gap:9px;white-space:nowrap;
  background:rgba(26,30,45,.92);border:1px solid color-mix(in srgb,var(--c) 34%,transparent);border-radius:999px;
  padding:1.05vh 1.1vw 1.05vh .9vw;color:var(--paper);
  transition:border-color .18s, box-shadow .18s, transform .18s, background .18s}
.fn:hover{border-color:var(--c);background:rgba(34,39,57,.97);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--c) 45%,transparent), 0 6px 24px color-mix(in srgb,var(--c) 22%,transparent)}
.fn .st{width:9px;height:9px;border-radius:50%;flex:0 0 9px;box-shadow:0 0 9px currentColor}
.fn .nm{font-size:clamp(13.5px,1.85vh,17px);font-weight:700;letter-spacing:.01em}
.fn .bc{font-family:var(--mono);font-size:clamp(10px,1.25vh,12px);color:var(--dim);letter-spacing:.05em;margin-left:2px}
.st.impl{background:var(--fixed);color:var(--fixed)} .st.part{background:var(--part);color:var(--part)}
.st.desg{background:var(--desg);color:var(--desg)} .st.none{background:var(--none);color:var(--none)}

/* ---------- base band (foundation) ---------- */
.baseband{grid-column:2;grid-row:2;padding:0 2.4vw 2.6vh;position:relative}
.baseband .plate{border:1px solid var(--line2);border-radius:16px;background:linear-gradient(180deg,#1a1e2f,#151827);
  box-shadow:0 -8px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(236,233,226,.05);
  padding:1.4vh 1.4vw 1.5vh;display:flex;align-items:center;gap:1vw}
.baseband .blabel{flex:0 0 auto;text-align:center;padding:0 1vw;border-right:1px solid var(--line)}
.baseband .blabel .jp{font-family:var(--disp);font-weight:900;font-size:clamp(21px,3.1vh,30px);letter-spacing:.18em;color:var(--base)}
.baseband .blabel .en{font-family:var(--mono);font-size:clamp(8px,1vh,10px);letter-spacing:.26em;color:var(--dim);margin-top:.2vh}
.baseband .chips{flex:1;display:grid;grid-template-columns:repeat(8,1fr);gap:.6vw}
.baseband .fnb{display:flex;flex-direction:column;justify-content:center;gap:.35vh;text-align:left;
  background:rgba(26,30,45,.85);border:1px solid color-mix(in srgb,var(--base) 30%,transparent);border-radius:10px;
  padding:.8vh .7vw;color:var(--paper);min-width:0;transition:border-color .18s, box-shadow .18s, background .18s}
.baseband .fnb:hover{border-color:var(--base);background:rgba(34,39,57,.96);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--base) 42%,transparent), 0 6px 22px rgba(143,149,168,.18)}
.fnb .nm{font-size:clamp(12px,1.6vh,15px);font-weight:700;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fnb .meta{display:flex;align-items:center;gap:7px}
.fnb .st{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.fnb .bc{font-family:var(--mono);font-size:clamp(9.5px,1.15vh,11.5px);color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.baseband .caption{position:absolute;top:-3.4vh;left:44%;transform:translateX(-50%);text-align:center;
  font-size:clamp(11px,1.4vh,13.5px);color:var(--dim);letter-spacing:.1em;white-space:nowrap;
  background:var(--ink);padding:.3vh 1.2vw;border-radius:999px}
.baseband .caption b{color:var(--paper)}

/* reveal */
.reveal .rnode,.reveal .fnb,.reveal .plate{opacity:0;transform:translateY(8px);transition:opacity .6s ease, transform .6s ease}
.reveal.on .rnode,.reveal.on .fnb,.reveal.on .plate{opacity:1;transform:none}
svg path.animatable{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset 1s ease}
.reveal.on svg path.animatable{stroke-dashoffset:0}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .reveal .rnode,.reveal .fnb,.reveal .plate{opacity:1;transform:none}
  svg path.animatable{stroke-dashoffset:0}
}
/* ---------- mobile / narrow: stacked layout (desktop radial untouched) ---------- */
#mobileMap{display:none}
.mgroup{margin-top:24px}
.mghead{display:flex;align-items:baseline;gap:10px;padding:0 2px 10px;border-bottom:1px solid var(--line);margin-bottom:12px}
.mgjp{font-family:var(--disp);font-weight:900;font-size:22px;letter-spacing:.1em;color:var(--c)}
.mgen{font-family:var(--mono);font-size:9px;letter-spacing:.28em;color:var(--dim)}
.mgrows{display:flex;flex-direction:column;gap:8px}
.mrow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  background:rgba(26,30,45,.85);border:1px solid color-mix(in srgb,var(--c) 26%,transparent);
  border-radius:12px;padding:13px 14px;color:var(--paper);min-height:50px;
  transition:border-color .15s, background .15s}
.mrow:hover{border-color:var(--c)} .mrow:active{background:rgba(34,39,57,.97)}
.mrow .st{width:10px;height:10px;border-radius:50%;flex:0 0 10px;box-shadow:0 0 8px currentColor}
.mrname{flex:1;font-size:15px;font-weight:700;line-height:1.3}
.mrbadge{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em;flex:0 0 auto}
@media (max-width:1000px){
  html,body{height:auto}
  body{overflow-x:hidden;overflow-y:auto}
  .stage{height:auto;display:block}
  .radialwrap,.baseband{display:none}
  .side{grid-row:auto;display:block;overflow:visible;padding:26px 20px 6px;gap:0}
  .slogan{writing-mode:horizontal-tb;max-height:none;align-self:auto;
    font-size:clamp(26px,7vw,40px);letter-spacing:.1em;line-height:1.5;margin-bottom:18px}
  .slogan small{margin-left:0;margin-top:8px;font-size:11px;letter-spacing:.26em}
  .infocard .sub,.infocard .legend span,.infocard .stat .n,.infocard .stat .l{white-space:normal}
  #mobileMap{display:block;padding:6px 16px 44px}
}

/* ---------- drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(8,10,17,.66);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(600px,100%);background:var(--panel);border-left:1px solid var(--line);
  transform:translateX(102%);transition:transform .26s cubic-bezier(.22,.8,.35,1);z-index:50;display:flex;flex-direction:column}
.drawer.on{transform:translateX(0)}
.d-head{position:relative;padding:24px 28px 18px;border-bottom:1px solid var(--line)}
.d-head::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c);opacity:.9}
.d-head .grp{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--c)}
.d-head h2{font-family:var(--disp);font-weight:900;font-size:25px;margin-top:6px;line-height:1.45}
.d-head .path{font-family:var(--mono);font-size:11.5px;color:var(--tho);margin-top:8px;word-break:break-all}
.d-head .stline{margin-top:10px;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px}
.d-head .stline .st{width:9px;height:9px;border-radius:50%}
.d-close{position:absolute;top:16px;right:18px;background:transparent;border:1px solid var(--line2);color:var(--paper);border-radius:10px;width:36px;height:36px;font-size:16px;transition:background .15s}
.d-close:hover{background:var(--panel2)}
.d-body{overflow-y:auto;padding:24px 28px 40px;flex:1;line-height:1.6;font-size:15px}
.d-sec{margin-bottom:26px}
.d-sec h3{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--dim);margin-bottom:10px}
.d-sec .role{font-size:14px;line-height:1.95}
.d-sec .role em{font-style:normal;color:var(--c);font-weight:700}
.feat{border:1px solid color-mix(in srgb,var(--fixed) 55%,transparent);border-radius:14px;padding:16px 18px;background:rgba(76,195,138,.05)}
#featSlot{transition:height .32s cubic-bezier(.4,0,.2,1);overflow:hidden}
.feat.landing{animation:featLand .3s cubic-bezier(.34,1.4,.5,1)}
@keyframes featLand{0%{transform:scale(.9);opacity:.3}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
/* flying clone used for the promote animation — geometry matches its landing target exactly */
.flyer{position:fixed;z-index:60;pointer-events:none;overflow:hidden;will-change:transform,opacity;line-height:1.6}
.flyer.up{border:none;border-radius:14px;padding:0;background:var(--panel);box-shadow:none}
.flyer.down{border:1px solid var(--line);border-radius:11px;padding:12px 15px;background:var(--panel2)}
.flyer .id{font-family:var(--mono);font-size:10.5px;color:var(--fixed);letter-spacing:.06em}
.flyer.down .id{color:var(--dim);flex:0 0 auto}
.flyer.down .top2{display:flex;gap:10px;align-items:baseline}
.flyer.down .sym{font-size:12.8px;font-weight:600;line-height:1.6}
.flyer.down .fix{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.7}
.flyer.down .fix b{color:var(--fixed);font-weight:700}
.flyer.up .id{font-size:11px;letter-spacing:.1em}
.feat.ghost{opacity:0}
.bitem.ghost{opacity:0}
@media (prefers-reduced-motion:reduce){.feat.landing{animation:none}}
.feat .id{font-family:var(--mono);font-size:11px;color:var(--fixed);letter-spacing:.1em}
.feat .t{font-weight:700;font-size:15px;margin-top:3px;font-family:var(--disp)}
.feat .row{display:flex;gap:12px;font-size:13px;margin-top:9px;line-height:1.8}
.feat .k{flex:0 0 3.1em;font-weight:700;font-size:11.5px;padding-top:2px}
.feat .row.sym .k{color:var(--pers)} .feat .row.cause .k{color:var(--exp)} .feat .row.fix .k{color:var(--fixed)}
.blist{display:flex;flex-direction:column;gap:9px}
.bitem{border:1px solid var(--line);border-radius:11px;padding:12px 15px;background:var(--panel2);cursor:pointer;
  transition:border-color .16s, background .16s, transform .16s}
.bitem:hover{border-color:var(--line2);background:#262c40;transform:translateX(2px)}
.bitem.active{border-color:var(--fixed);background:rgba(76,195,138,.08);cursor:default;transform:none}
.bitem.active .id{color:var(--fixed)}
.bitem .top2{display:flex;gap:10px;align-items:baseline}
.bitem .id{font-family:var(--mono);font-size:10.5px;color:var(--dim);flex:0 0 auto}
.bitem .sym{font-size:12.8px;font-weight:600;line-height:1.6}
.bitem .fix{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.7}
.bitem .fix b{color:var(--fixed);font-weight:700}
.blist-hint{font-size:11px;color:var(--dim);letter-spacing:.04em;margin:2px 0 8px}
.none-note{font-size:12.5px;color:var(--dim);line-height:1.8}
</style>
</head>
<body>

<div class="stage">
  <div class="side">
    <div class="slogan">いつもそばに、誰とも違う<small>ADEST — IMPLEMENTATION MAP</small></div>
    <div class="infocard">
      <p class="sub">AIを「プログラム」ではなく<br><b>「擬似的な人の分身」</b> として設計する。<br>哲学と実装と実戦記録の全対応図。</p>
      <span class="hint"><b>機能をクリック</b><br>詳細＋対応バグを表示</span>
      <div class="legend">
        <span class="impl"><i></i>実装+配線済</span>
        <span class="part"><i></i>部分/土台</span>
        <span class="desg"><i></i>設計・実装残</span>
        <span class="none"><i></i>未着手</span>
      </div>
      <div class="stat"><span class="n">95<span style="font-size:.55em;color:var(--dim)">+</span></span><span class="l"><b>観察→原因特定→修正→再検証</b><br>を繰り返した実戦記録</span></div>
    </div>
  </div>

  <div class="radialwrap">
    <div class="radial reveal" id="radial">
      <svg id="rsvg"></svg>
    </div>
  </div>

  <div class="baseband">
    <span class="caption">5要素は、この「<b>基盤</b>」の上で動く — 人を乗せる身体</span>
    <div class="plate reveal" id="basePlate">
      <div class="blabel"><div class="jp">基盤</div><div class="en">BASE</div></div>
      <div class="chips" id="baseChips"></div>
    </div>
  </div>

  <div class="mobilemap" id="mobileMap"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="d-title">
  <div class="d-head" id="dHead">
    <button class="d-close" id="dClose" aria-label="閉じる">×</button>
    <div class="grp" id="dGrp"></div>
    <h2 id="d-title"></h2>
    <div class="path" id="dPath"></div>
    <div class="stline" id="dSt"></div>
  </div>
  <div class="d-body" id="dBody"></div>
</aside>

<script>
"use strict";
const GROUPS = {
  soul:{jp:"魂",en:"SOUL",hex:"#9db4cc",c:"var(--soul)"},
  pers:{jp:"性格",en:"PERSONALITY",hex:"#d98ba1",c:"var(--pers)"},
  tho:{jp:"思考",en:"THOUGHT",hex:"#6cc5b5",c:"var(--tho)"},
  exp:{jp:"経験",en:"EXPERIENCE",hex:"#d4aa6a",c:"var(--exp)"},
  mem:{jp:"記憶",en:"MEMORY",hex:"#a98fd6",c:"var(--mem)"},
  base:{jp:"基盤",en:"BASE",hex:"#8f95a8",c:"var(--base)"}
};
const ST = {impl:"実装+配線済 (実機確認残を含む)", part:"部分実装/土台", desg:"設計確定・コード実装残", none:"未着手"};
const STSHORT = {impl:"実装済", part:"部分", desg:"設計済", none:"未着手"};

const FEATURES = [
{g:"soul",st:"impl",short:"公理系",name:"公理系（system_axioms）",path:"adest/runtime/system_axioms.py",
 role:"分身の<em>行動原則そのもの</em>。「観測していないものを語らない」等を構造データで持ち、場面ごとに有効なものだけ適用。新原則の追加は衝突洗い出しと設計者承認が必須。",
 feat:{id:"BUG-37",t:"起動直後の状況捏造",sym:"挨拶しただけで「こちらのゲームもどうぞよろしく」とゲーム前提の応答。",cause:"前回の会話の余韻が残り、実況中だと推測して欠けた文脈を想像で埋めた。",fix:"「観測欄に対象が出ていない限り前提にした応答は捏造扱いで禁止」を公理に追加。"},
 bugs:[
  {id:"BUG-26",sym:"画像認識が未実装なのに画面の中身を捏造。",fix:"<b>対処:</b> 「観測したものだけを語る」を断言形式の公理に固定。"},
  {id:"BUG-30",sym:"ユーザーの質問文を「画面の文字」としてオウム返し。",fix:"<b>対処:</b> 役割分離を明文化し、オウム返し厳禁の節を追加。"},
  {id:"BUG-79",sym:"文法エラー「見えるですね」が訂正後も反復。",fix:"<b>対処:</b> 良い例・悪い例を公理に明示。"},
  {id:"BUG-91",sym:"挨拶に「青い惑星が見えるですね」と文脈無視の暴発。",fix:"<b>対処:</b> 公理の動的選定＋意図に関連する記憶だけ注入。"}
 ]},

/* ---------- radial build ---------- */
const radial=document.getElementById("radial");
const rsvg=document.getElementById("rsvg");
const ORDER=["soul","pers","tho","exp","mem"];

function buildRadial(){
  radial.querySelectorAll(".rnode").forEach(n=>n.remove());
  const W=radial.clientWidth, H=radial.clientHeight;
  const cx=W*0.44, cy=H*0.5, R=Math.min(W*0.37,H*0.45);
  const R_node=R*0.9, R_el=R*0.46, R_c=Math.max(60,R*0.21);
  rsvg.setAttribute("viewBox",`0 0 ${W} ${H}`);

  const mains=ORDER.map(gk=>({gk,feats:FEATURES.filter(f=>f.g===gk)}));
  const total=mains.reduce((s,m)=>s+m.feats.length,0);
  const GAPDEG=7, avail=360-GAPDEG*mains.length;
  let a=-90+GAPDEG/2; // start at top
  let paths=""; let idx=0;
  const pills=[];
  mains.forEach(m=>{
    const span=avail*(m.feats.length/total);
    const midA=a+span/2;
    // element badge
    const ex=cx+Math.cos(rad(midA))*R_el, ey=cy+Math.sin(rad(midA))*R_el;
    const g=GROUPS[m.gk];
    const el=document.createElement("div");
    el.className="rnode elbadge"; el.style.setProperty("--c",g.c);
    el.innerHTML=`<div class="jp">${g.jp}</div><div class="en">${g.en}</div>`;
    radial.appendChild(el);
    const eb=el.getBoundingClientRect();
    el.style.left=(ex-eb.width/2)+"px"; el.style.top=(ey-eb.height/2)+"px";
    el.style.transitionDelay=(0.1+idx*0.02)+"s";
    // arc for the sector at R_el ring
    paths+=arc(cx,cy,R_el+R*0.11,a,a+span,g.hex,2,"animatable");
    // center -> element spoke
    paths+=curveP(cx+Math.cos(rad(midA))*R_c, cy+Math.sin(rad(midA))*R_c, ex-Math.cos(rad(midA))*eb.width*0.0, ey, "rgba(120,128,160,.5)",1.6);
    // features (place boxes; spokes drawn after de-collision)
    m.feats.forEach((f,k)=>{
      const fa=a+span*((k+0.5)/m.feats.length);
      const fx=cx+Math.cos(rad(fa))*R_node, fy=cy+Math.sin(rad(fa))*R_node;
      const i=FEATURES.indexOf(f);
      const bn=(f.bugs?f.bugs.length:0)+(f.feat?1:0);
      const b=document.createElement("button");
      b.className="rnode fn"; b.style.setProperty("--c",g.c);
      b.dataset.i=i; b.setAttribute("aria-haspopup","dialog");
      b.innerHTML=`<span class="st ${f.st}"></span><span class="nm">${f.short}</span><span class="bc">${bn>0?bn:STSHORT[f.st]}</span>`;
      radial.appendChild(b);
      const bb=b.getBoundingClientRect();
      const cos=Math.cos(rad(fa)), sin=Math.sin(rad(fa));
      let bx,by;
      if(cos>0.25){ bx=fx; by=fy-bb.height/2; }
      else if(cos<-0.25){ bx=fx-bb.width; by=fy-bb.height/2; }
      else { bx=fx-bb.width/2; by=sin>0? fy : fy-bb.height; }
      b.style.transitionDelay=(0.2+idx*0.03)+"s";
      pills.push({b,gk:m.gk,cos,sin,fx,fy,w:bb.width,h:bb.height,x:bx,y:by});
      idx++;
    });
    a+=span+GAPDEG;
  });

  // ---- light de-collision: separate overlapping pills horizontally, keep vertical/ring intact ----
  const M=8;
  for(let it=0;it<50;it++){
    let moved=false;
    for(let i=0;i<pills.length;i++)for(let j=i+1;j<pills.length;j++){
      const p=pills[i],q=pills[j];
      const ox=Math.min(p.x+p.w,q.x+q.w)-Math.max(p.x,q.x);
      const oy=Math.min(p.y+p.h,q.y+q.h)-Math.max(p.y,q.y);
      if(ox>-M&&oy>-M){
        const push=(Math.min(ox,oy)+M)/2+0.5;
        // push apart along whichever axis overlaps less
        if(ox<=oy){ const dir=(p.x<=q.x)?-1:1; p.x+=dir*push; q.x-=dir*push; }
        else { const dir=(p.y<=q.y)?-1:1; p.y+=dir*push; q.y-=dir*push; }
        moved=true;
      }
    }
    if(!moved) break;
  }
  // clamp inside area, then place + draw spokes to final edges
  pills.forEach(p=>{
    p.x=Math.max(6,Math.min(W-p.w-6,p.x));
    p.y=Math.max(6,Math.min(H-p.h-6,p.y));
    p.b.style.left=p.x+"px"; p.b.style.top=p.y+"px";
    const sx=cx+p.cos*(R_el+R*0.11), sy=cy+p.sin*(R_el+R*0.11);
    const tx=p.cos>0.25? p.x : (p.cos<-0.25? p.x+p.w : p.x+p.w/2);
    const ty=(p.cos>0.25||p.cos<-0.25)? p.y+p.h/2 : (p.sin>0? p.y : p.y+p.h);
    paths+=curveRad(sx,sy,tx,ty,cx,cy,GROUPS[p.gk].hex,1.4);
  });

  // center node
  const c=document.createElement("div");
  c.className="rnode center";
  c.style.cssText=`left:${cx-R_c}px;top:${cy-R_c}px;width:${R_c*2}px;height:${R_c*2}px`;
  c.innerHTML=`<div class="nm">Adest</div><div class="en">5 ELEMENTS</div>`;
  radial.appendChild(c);
  rsvg.innerHTML=paths;
  requestAnimationFrame(()=>requestAnimationFrame(()=>radial.classList.add("on")));
}
function rad(d){return d*Math.PI/180}
function arc(cx,cy,r,a1,a2,stroke,w,cls){
  const large=(a2-a1)>180?1:0;
  const x1=cx+Math.cos(rad(a1))*r, y1=cy+Math.sin(rad(a1))*r;
  const x2=cx+Math.cos(rad(a2))*r, y2=cy+Math.sin(rad(a2))*r;
  return `<path class="${cls||''}" pathLength="1" d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="${w}" stroke-linecap="round" opacity="0.55"/>`;
}
function curveP(x1,y1,x2,y2,stroke,w){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  return `<path class="animatable" pathLength="1" d="M${x1},${y1} Q${mx},${my} ${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="${w}" stroke-linecap="round" opacity="0.7"/>`;
}
function curveRad(x1,y1,x2,y2,cx,cy,stroke,w){
  // control point pushed outward along the radial direction for a gentle fan curve
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=mx-cx, dy=my-cy, len=Math.hypot(dx,dy)||1;
  const px=mx+dx/len*18, py=my+dy/len*18;
  return `<path class="animatable" pathLength="1" d="M${x1},${y1} Q${px},${py} ${x2},${y2}" fill="none" stroke="${stroke}" stroke-width="${w}" stroke-linecap="round" opacity="0.65"/>`;
}

  dHead.style.setProperty("--c",g.c); dGrp.style.color=g.c;
  dGrp.textContent=`${g.jp} ／ ${g.en}`;
  dTitle.textContent=f.name; dPath.textContent=f.path;
  dSt.innerHTML=`<span class="st ${f.st}" style="display:inline-block"></span>${ST[f.st]}`;
  let html=`<div class="d-sec"><h3>PHILOSOPHY — 人として設計したときの位置</h3><p class="role">${f.role}</p></div>`;
  curPool=bugPool(f); curFeat=0;
  curOrder=curPool.map((_,i)=>i).filter(i=>i!==curFeat);   // 先頭を代表に、残りをリスト順に
  if(curPool.length){ html+=renderBugs(curPool); }
  else{ html+=`<div class="d-sec"><h3>BATTLE LOG</h3><p class="none-note">この機能に紐づく大きな不具合の記録はまだない（または設計段階）。壊れていないことも、記録が語る事実のひとつ。</p></div>`; }
  dBody.innerHTML=html; dBody.scrollTop=0;
  drawer.classList.add("on"); scrim.classList.add("on");
  document.getElementById("dClose").focus();
}
// クリックで入れ替え：選んだバグが上へ、今のピックアップが選んだバグの居た場所へ降りる
dBody.addEventListener("click",e=>{
  const item=e.target.closest(".bitem[data-k]"); if(!item||!curPool) return;
  const pk=+item.dataset.k; if(pk===curFeat) return;
  const slot=document.getElementById("featSlot"); if(!slot) return;
  const outCard=slot.querySelector(".feat");
  const picked=curPool[pk], oldFeat=curPool[curFeat], oldFeatIdx=curFeat;
  const reduce=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  let newH=null;

  const commit=()=>{
    // curOrder 内の pk の位置を、旧代表 oldFeatIdx に置き換える（選んだバグはリストから消え、旧代表がその席に座る）
    const pos=curOrder.indexOf(pk);
    if(pos>=0) curOrder[pos]=oldFeatIdx;
    curFeat=pk;
    slot.innerHTML=featCard(picked);
    const bl=document.getElementById("blist");
    if(bl) bl.innerHTML=curOrder.map(pi=>bugItemHTML(curPool[pi],pi)).join("");
    slot.querySelector(".feat")?.classList.remove("ghost");
    // 実測した新高さのまま維持（height="" による再計算のズレを避ける）。未計測時は自然高さ。
    slot.style.height = (newH!=null) ? newH+"px" : "";
  };
  if(reduce){ commit(); return; }

  const itemRect=item.getBoundingClientRect();
  const slotRect=(outCard||slot).getBoundingClientRect();
  const oldH=slotRect.height;

  // FEATURED を ghost 化
  item.classList.add("ghost");
  if(outCard) outCard.classList.add("ghost");

  // === リストのデータを先に確定＆再描画（着地先を固定する） ===
  const pos=curOrder.indexOf(pk);
  if(pos>=0) curOrder[pos]=oldFeatIdx;   // 選んだバグの席に旧代表が座る
  curFeat=pk;
  const bl=document.getElementById("blist");
  if(bl) bl.innerHTML=curOrder.map(pi=>bugItemHTML(curPool[pi],pi)).join("");
  const destItem=bl && Array.from(bl.querySelectorAll(".bitem")).find(el=>el.querySelector(".id")?.textContent===oldFeat.id);

  // 新FEATUREDの「本当の落ち着き高さ」を、実スロットに一瞬入れて実測（body直下のprobeでは行間が違いズレる）
  const prevTrans=slot.style.transition; slot.style.transition="none";
  const prevHTML=slot.innerHTML;
  slot.style.height="";
  slot.innerHTML=featCard(picked);
  newH=slot.getBoundingClientRect().height;   // 着地後と同一条件の自然高さ
  // 着地時のリスト位置もこの状態で実測（FEATURED が newH に伸びた状態）
  let destRect=itemRect;
  if(destItem){ destItem.classList.add("ghost"); destRect=destItem.getBoundingClientRect(); }
  // 元の見た目(空/旧カード)に戻し、oldH から newH へ滑らかに遷移
  slot.innerHTML=prevHTML;
  slot.querySelector(".feat")?.classList.add("ghost");
  slot.style.height=oldH+"px";
  void slot.offsetWidth;
  slot.style.transition=prevTrans;
  requestAnimationFrame(()=>{ slot.style.height=newH+"px"; });

  // 上りカード＝本物のFEATUREDカードそのものを飛ばす
  const up=document.createElement("div");
  up.className="flyer up"; up.style.width=slotRect.width+"px";
  up.style.transformOrigin="top left";
  up.style.left=itemRect.left+"px"; up.style.top=itemRect.top+"px";
  up.innerHTML=featCard(picked);
  document.body.appendChild(up);
  const upDX=slotRect.left-itemRect.left, upDY=slotRect.top-itemRect.top;
  const upA=up.animate([
    {transform:"translate(0px,0px) scale(.5)",opacity:.6,offset:0},
    {transform:`translate(${upDX*0.5}px,${upDY*0.5}px) scale(.5)`,opacity:.95,offset:.5},
    {transform:`translate(${upDX}px,${upDY}px) scale(1.04)`,opacity:1,offset:.85},
    {transform:`translate(${upDX}px,${upDY}px) scale(1)`,opacity:1,offset:1}
  ],{duration:560,easing:"cubic-bezier(.34,1.2,.5,1)",fill:"forwards"});

  // 下りカード：旧代表 → 確定済みの実着地先 destRect（ズレない）
  const down=document.createElement("div");
  down.className="flyer down"; down.style.width=destRect.width+"px";
  down.style.transformOrigin="top left";
  down.style.left=slotRect.left+"px"; down.style.top=slotRect.top+"px";
  down.innerHTML=`<div class="top2"><span class="id">${oldFeat.id}</span><span class="sym">${oldFeat.sym}</span></div>
    <div class="fix"><b>対処:</b> ${oldFeat.fix}</div>`;
  document.body.appendChild(down);
  const dnDX=destRect.left-slotRect.left, dnDY=destRect.top-slotRect.top;
  const dnA=down.animate([
    {transform:"translate(0px,0px) scale(1)",opacity:1,offset:0},
    {transform:`translate(${dnDX*0.5}px,${dnDY*0.5}px) scale(.6)`,opacity:.95,offset:.5},
    {transform:`translate(${dnDX}px,${dnDY}px) scale(1.03)`,opacity:1,offset:.85},
    {transform:`translate(${dnDX}px,${dnDY}px) scale(1)`,opacity:1,offset:1}
  ],{duration:560,easing:"cubic-bezier(.34,1.2,.5,1)",fill:"forwards"});

  let done=false;
  const finish=()=>{
    if(done) return; done=true;
    // 上りカードをFEATUREDスロットの中身に採用（差し替えゼロ）
    up.getAnimations().forEach(a=>a.cancel());
    const inner=up.firstElementChild;
    up.remove();
    slot.innerHTML="";
    slot.appendChild(inner);
    // 高さ固定を解除して自然な高さに戻す（overflow による下端の切れを防ぐ）
    slot.style.height="";
    // 下りカードの着地先(実項目)を表示し、飛翔カードは即消し（同座標なので継ぎ目なし）
    if(destItem) destItem.classList.remove("ghost");
    down.remove();
  };
  upA.onfinish=finish;
  setTimeout(finish, 600);
});
function closeD(){ drawer.classList.remove("on"); scrim.classList.remove("on"); if(lastFocus) lastFocus.focus(); }
document.getElementById("dClose").addEventListener("click",closeD);
scrim.addEventListener("click",closeD);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeD(); });
</script>
</body>
</html>
